<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Atmosphere — an immersive weather app with live animated skies, fluid glass UI, and real-time forecasts for any city worldwide.">
    <title>Atmosphere | Premium Weather</title>
    <!-- Emoji Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌤</text></svg>">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Animated Sky Gradient Background -->
    <div id="sky-bg" class="sky-bg"></div>

    <!-- Live Cloud Layer -->
    <div id="cloud-layer" class="cloud-layer"></div>

    <!-- Weather Particle Animations (Rain/Snow/Stars) -->
    <div id="weather-animations" class="weather-animations"></div>

    <!-- Lightning Flash Overlay -->
    <div id="lightning-flash" class="lightning-flash"></div>

    <!-- Frosted overlay for glass contrast -->
    <div class="background-overlay"></div>

    <div class="app-container">
        <header class="header">
            <div class="header-row">
                <div class="search-wrapper">
                    <div class="search-container">
                        <i class="fas fa-search search-icon"></i>
                        <input type="text" id="city-input" placeholder="Search city..." autocomplete="off">
                        <button id="gps-btn" class="header-icon-btn" aria-label="Use my location" title="Use my location">
                            <i class="fas fa-location-crosshairs"></i>
                        </button>
                        <button id="search-btn" class="header-icon-btn" aria-label="Search">
                            <i class="fas fa-arrow-right"></i>
                        </button>
                    </div>
                    <ul id="suggestions-list" class="suggestions-list hidden">
                        <!-- Suggestions injected via JS -->
                    </ul>
                </div>
                <button id="unit-toggle" class="unit-toggle" aria-label="Toggle temperature unit">°C</button>
            </div>
            <div id="error-message" class="error-message hidden">Location not found. Please try again.</div>
        </header>

        <main class="weather-content hidden" id="weather-content">
            <div class="current-weather">
                <div class="location-header">
                    <h1 id="city-name">London</h1>
                    <p id="current-date">Monday, 28 April</p>
                </div>

                <div class="weather-main">
                    <div class="weather-icon-container">
                        <i id="weather-icon" class="fas fa-cloud-sun weather-icon-large"></i>
                    </div>
                    <div class="temperature">
                        <span id="temp-value">22</span><span class="temp-unit">°</span>
                    </div>
                    <p id="weather-description" class="weather-desc">Partly Cloudy</p>
                </div>

                <div class="weather-details">
                    <div class="detail-card interactive" id="card-humidity" data-type="humidity" tabindex="0" role="button">
                        <div class="detail-icon-wrapper">
                            <i class="fas fa-droplet"></i>
                        </div>
                        <div class="detail-info">
                            <span class="detail-label">Humidity</span>
                            <span id="humidity-value" class="detail-value">45%</span>
                        </div>
                    </div>
                    <div class="detail-card interactive" id="card-wind" data-type="wind" tabindex="0" role="button">
                        <div class="detail-icon-wrapper">
                            <i class="fas fa-wind"></i>
                        </div>
                        <div class="detail-info">
                            <span class="detail-label">Wind</span>
                            <span id="wind-value" class="detail-value">12 km/h</span>
                        </div>
                    </div>
                    <div class="detail-card interactive" id="card-feels" data-type="feels" tabindex="0" role="button">
                        <div class="detail-icon-wrapper">
                            <i class="fas fa-temperature-half"></i>
                        </div>
                        <div class="detail-info">
                            <span class="detail-label">Feels Like</span>
                            <span id="feels-like-value" class="detail-value">24°</span>
                        </div>
                    </div>
                </div>

                <!-- Hourly Forecast -->
                <div class="forecast-section hourly-section">
                    <h3 class="forecast-title" id="hourly-title">Today</h3>
                    <div class="forecast-container" id="hourly-forecast-container"></div>
                </div>

                <!-- 7-Day Forecast -->
                <div class="forecast-section daily-section">
                    <h3 class="forecast-title">7-Day Forecast</h3>
                    <div class="forecast-container" id="forecast-container"></div>
                </div>

                <!-- Live Radar Map -->
                <div class="forecast-section map-section">
                    <h3 class="forecast-title">Live Weather Radar</h3>
                    <div class="map-wrapper">
                        <div id="map-loading" class="map-loading">
                            <div class="spinner small"></div>
                            <span>Loading radar...</span>
                        </div>
                        <iframe id="windy-map" width="100%" height="280" src="about:blank" title="Live weather radar map"></iframe>
                    </div>
                </div>
            </div>
        </main>

        <!-- Loading Skeleton -->
        <div id="loading-skeleton" class="loading-skeleton hidden">
            <div class="skeleton-block skeleton-city"></div>
            <div class="skeleton-block skeleton-date"></div>
            <div class="skeleton-block skeleton-icon-block"></div>
            <div class="skeleton-block skeleton-temp-block"></div>
            <div class="skeleton-block skeleton-desc"></div>
            <div class="skeleton-row">
                <div class="skeleton-block skeleton-card"></div>
                <div class="skeleton-block skeleton-card"></div>
                <div class="skeleton-block skeleton-card"></div>
            </div>
            <div class="skeleton-block skeleton-forecast-block"></div>
        </div>

        <!-- Initial State -->
        <div id="initial-state" class="initial-state">
            <div class="magical-icon-wrapper">
                <i class="fas fa-globe splash-icon"></i>
            </div>
            <h2>Atmosphere</h2>
            <p>Type a city name to see the magic.</p>
        </div>
    </div>

    <!-- Detail Modal -->
    <div class="modal-overlay hidden" id="modal-overlay">
        <div class="modal" id="detail-modal">
            <button class="modal-close" id="modal-close" aria-label="Close modal"><i class="fas fa-xmark"></i></button>
            <div class="modal-header">
                <div class="modal-icon-wrapper">
                    <i id="modal-icon" class="fas fa-wind"></i>
                </div>
                <h3 id="modal-title">Wind Details</h3>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- Modal content injected via JS -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
